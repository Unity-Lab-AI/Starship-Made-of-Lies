name: Build — Mobile (Capacitor iOS/Android)

on:
  workflow_dispatch:
  push:
    branches: ['release/**']
  pull_request:
    branches: [main]
    paths:
      - 'capacitor.config.ts'
      - '.github/workflows/build-mobile.yml'

jobs:
  build-android:
    name: Android (.aab + .apk)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web bundle
        run: pnpm run build:web

      - name: Sync Capacitor (Android)
        run: pnpm exec cap sync android

      - name: Build Android bundle
        working-directory: android
        run: ./gradlew bundleRelease assembleRelease
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smol-android-${{ github.sha }}
          path: |
            android/app/build/outputs/bundle/release/*.aab
            android/app/build/outputs/apk/release/*.apk
          retention-days: 14
          if-no-files-found: warn

  build-ios:
    name: iOS (.ipa)
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web bundle
        run: pnpm run build:web

      - name: Sync Capacitor (iOS)
        run: pnpm exec cap sync ios

      - name: Install Cocoapods
        working-directory: ios/App
        run: pod install --repo-update

      - name: Build iOS archive
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -archivePath build/App.xcarchive archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload iOS archive
        uses: actions/upload-artifact@v4
        with:
          name: smol-ios-${{ github.sha }}
          path: ios/App/build/App.xcarchive
          retention-days: 14
          if-no-files-found: warn
