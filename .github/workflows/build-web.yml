name: Build — Web (Vite production bundle)

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-web:
    name: Vite production bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build asset manifest
        run: node tools/build-asset-manifest.cjs

      - name: Build web bundle
        run: pnpm run build:web
        env:
          SMOL_BASE_PATH: /

      - name: Upload web bundle
        uses: actions/upload-artifact@v4
        with:
          name: smol-web-${{ github.sha }}
          path: client/dist
          retention-days: 14
